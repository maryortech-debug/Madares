<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت مدارس غیردولتی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--card:#1a2132;--card2:#212b3d;
  --border:#2a3650;--border2:#344160;
  --accent:#4f8ef7;--accent2:#3a6fd4;--accent3:#6aa3ff;
  --green:#34d399;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;--orange:#fb923c;
  --text:#e8edf7;--text2:#9babc7;--text3:#6b7fa3;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a0f1e,#111827,#0d1525)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.6);text-align:center}
.login-logo{font-size:42px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:800;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:32px}
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:.2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.num-btn{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:20px;font-weight:600;color:var(--text);cursor:pointer;transition:.15s;font-family:'Vazirmatn',sans-serif}
.num-btn:hover{background:var(--border);transform:scale(.97)}
.num-btn.del{font-size:16px;color:var(--text2)}
.login-err{color:var(--red);font-size:13px;margin-top:12px;min-height:20px}
/* APP SHELL */
#app{display:none;min-height:100vh;flex-direction:column}
.topnav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px}
.nav-brand{font-size:13px;font-weight:800;color:var(--accent3);white-space:nowrap}
.nav-actions{display:flex;gap:5px;align-items:center}
.nav-btn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'Vazirmatn',sans-serif;transition:.15s;white-space:nowrap}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}
.sidebar{width:176px;background:var(--bg2);border-left:1px solid var(--border);padding:12px 7px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex-shrink:0}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:9px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:500;transition:.15s}
.sidebar-item:hover{background:var(--bg3);color:var(--text)}
.sidebar-item.active{background:var(--accent);color:#fff}
.main-content{flex:1;overflow-y:auto;padding:14px}
/* STATS BAR — compact */
.stats-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.stat-chip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 8px;cursor:pointer;transition:.15s;user-select:none}
.stat-chip:hover{border-color:var(--accent)}
.stat-chip.active-filter{border-color:var(--accent);background:var(--card2)}
.chip-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.chip-dot.green{background:var(--green)}
.chip-dot.yellow{background:var(--yellow)}
.chip-dot.purple{background:var(--purple)}
.chip-dot.orange{background:var(--orange)}
.chip-dot.red{background:var(--red)}
.chip-dot.white{background:var(--text2)}
.chip-val{font-size:13px;font-weight:700;color:var(--text)}
.chip-lbl{font-size:11px;color:var(--text3)}
/* BUTTONS */
.btn{border:none;border-radius:9px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Vazirmatn',sans-serif;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(248,113,113,.25)}
.btn-danger:hover{background:rgba(248,113,113,.12)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:7px}
.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:3px 5px;border-radius:5px;transition:.15s;font-family:'Vazirmatn',sans-serif;line-height:1}
.icon-btn:hover{background:var(--bg3);color:var(--text)}
.icon-btn.del:hover{color:var(--red)}
/* SEARCH / FILTER ROW */
.search-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.search-input{flex:1;min-width:160px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 13px;color:var(--text);font-family:'Vazirmatn',sans-serif;font-size:12px;outline:none}
.search-input:focus{border-color:var(--accent)}
select.filter-sel{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 11px;color:var(--text);font-family:'Vazirmatn',sans-serif;font-size:11px;outline:none;cursor:pointer}
select.filter-sel:focus{border-color:var(--accent)}
/* SCHOOL CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.school-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:.2s}
.school-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,142,247,.12)}
.school-card.inactive{opacity:.55}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px;gap:6px}
.sc-name{font-size:14px;font-weight:700}
.sc-code{font-size:10px;color:var(--text3);margin-top:1px}
.status-badge{border-radius:5px;padding:2px 8px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
.s-active{background:rgba(52,211,153,.12);color:var(--green)}
.s-inactive{background:rgba(248,113,113,.12);color:var(--red)}
.s-review{background:rgba(251,191,36,.12);color:var(--yellow)}
.sc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tag{border-radius:5px;padding:2px 7px;font-size:10px;background:var(--bg3);color:var(--text2)}
/* CARD PEOPLE ROW */
.sc-people{border-top:1px solid var(--border2);padding-top:8px;margin-top:4px;display:flex;flex-direction:column;gap:4px}
.sc-person{display:flex;align-items:center;gap:5px;font-size:11px}
.sc-person-role{color:var(--text3);min-width:36px}
.sc-person-name{color:var(--text);font-weight:500;flex:1}
.sc-person-phone{color:var(--accent);font-size:10px}
.sc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:6px}
.sc-score{font-size:11px;color:var(--yellow)}
.sc-warns{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:5px;padding:1px 7px;font-size:10px;color:var(--red)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:14px;overflow-y:auto}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;width:100%;max-width:740px;box-shadow:0 20px 60px rgba(0,0,0,.6);margin:auto}
.modal-top{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.modal-title{font-size:16px;font-weight:800}
.modal-close{background:var(--bg3);border:1px solid var(--border);border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:17px;flex-shrink:0;transition:.15s}
.modal-close:hover{color:var(--red);border-color:var(--red)}
.modal-body{padding:16px 20px}
/* TABS */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto;padding-bottom:0}
.tab{padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);border:none;background:transparent;font-family:'Vazirmatn',sans-serif;white-space:nowrap;transition:.15s;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}
/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;margin-bottom:14px}
.info-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px}
.info-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.info-value{font-size:13px;font-weight:600}
.info-divider{grid-column:1/-1;border-bottom:1px solid var(--border);margin:2px 0}
/* PEOPLE BLOCK in info tab */
.person-block{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.person-block.founder{border-color:rgba(251,191,36,.3);background:linear-gradient(135deg,rgba(251,191,36,.05),transparent)}
.person-block.manager{border-color:rgba(79,142,247,.3);background:linear-gradient(135deg,rgba(79,142,247,.07),transparent)}
.person-title{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.person-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.pf{display:flex;flex-direction:column;gap:2px}
.pf-label{font-size:10px;color:var(--text3)}
.pf-val{font-size:13px;font-weight:600}
/* STAFF LIST */
.staff-list{display:flex;flex-direction:column;gap:6px}
.staff-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.staff-fields{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:2px 12px}
.sf-role{font-size:11px;color:var(--text3);font-weight:500}
.sf-name{font-size:13px;font-weight:600;color:var(--text)}
.sf-phone{font-size:12px;color:var(--accent)}
.sf-nid{font-size:11px;color:var(--text3)}
.staff-actions{display:flex;gap:2px;flex-shrink:0}
/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:11px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;color:var(--text2);font-weight:500}
.form-input,.form-select,.form-textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:'Vazirmatn',sans-serif;font-size:12px;outline:none;transition:.15s;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:70px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:var(--bg3);padding:8px 11px;text-align:right;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)}
.data-table td{padding:8px 11px;border-bottom:1px solid var(--border2);vertical-align:top}
.data-table tr:hover td{background:rgba(255,255,255,.015)}
/* EVAL */
.eval-list{display:flex;flex-direction:column;gap:7px}
.eval-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px}
.eval-q{font-size:12px;font-weight:600;margin-bottom:7px}
.eval-opts{display:flex;gap:5px;flex-wrap:wrap}
.eval-opt{padding:4px 11px;border-radius:6px;font-size:11px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-family:'Vazirmatn',sans-serif;transition:.15s}
.eval-opt:hover{border-color:var(--accent)}
.eval-opt.sel-1{background:rgba(248,113,113,.18);border-color:var(--red);color:var(--red)}
.eval-opt.sel-2{background:rgba(251,146,60,.18);border-color:var(--orange);color:var(--orange)}
.eval-opt.sel-3{background:rgba(251,191,36,.15);border-color:var(--yellow);color:var(--yellow)}
.eval-opt.sel-4{background:rgba(52,211,153,.13);border-color:var(--green);color:var(--green)}
.eval-opt.sel-5{background:rgba(79,142,247,.18);border-color:var(--accent);color:var(--accent3)}
/* RANK */
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s}
.rank-item:hover{border-color:var(--accent)}
.rank-pos{width:26px;font-size:14px;font-weight:800;color:var(--accent);text-align:center;flex-shrink:0}
.rank-score-bar{flex:1;background:var(--bg3);border-radius:4px;height:5px;overflow:hidden}
.rank-score-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:4px}
.rank-score-txt{font-size:13px;font-weight:700;color:var(--yellow);min-width:38px;text-align:left}
/* CONTACTS */
.contact-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
/* NOTE */
.note-card{background:var(--card);border:1px solid var(--border2);border-radius:9px;padding:11px;margin-bottom:6px}
.note-date{font-size:10px;color:var(--text3);margin-bottom:3px}
/* TOAST */
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:9px;font-weight:600;font-size:12px;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.ok{background:var(--green);color:#1a1a1a}
.toast.err{background:var(--red);color:#fff}
/* EMPTY */
.empty{text-align:center;padding:36px 16px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:8px}
/* SECTION HEADER */
.sec-hd{font-size:12px;font-weight:700;color:var(--text3);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
/* SUMMARY ROW */
.sum-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sum-box{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px;text-align:center}
.sum-val{font-size:17px;font-weight:800;margin-bottom:2px}
.sum-lbl{font-size:10px;color:var(--text3)}
/* PAYMENT */
.pay-item{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.amount-badge{background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.22);border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700;color:var(--accent3)}
/* TUITION BOX */
.tuition-box{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;margin-top:10px}
.tuition-field{display:flex;flex-direction:column;gap:3px}
/* MOBILE */
@media(max-width:640px){
  .sidebar{display:none}
  .main-content{padding:10px}
  .cards-grid{grid-template-columns:1fr}
  .modal{border-radius:0;min-height:100vh}
  .modal-overlay{padding:0}
  .layout{height:calc(100vh - 52px - 50px)}
  .stats-bar{gap:5px}
  .nav-actions .nav-btn:nth-child(n+3){display:none}
}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:100}
@media(max-width:640px){.mobile-nav{display:flex}}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px;cursor:pointer;color:var(--text3);font-size:9px;transition:.15s}
.mobile-nav-item.active,.mobile-nav-item:hover{color:var(--accent)}
.mobile-nav-item span:first-child{font-size:17px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
a.phone-link{color:var(--accent);text-decoration:none;font-size:12px}
a.phone-link:hover{text-decoration:underline}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🏫</div>
    <div class="login-title">پنل مدیریت مدارس غیردولتی</div>
    <div class="login-sub">کد عبور خود را وارد کنید</div>
    <div class="pin-display" id="pinDisplay"></div>
    <div class="numpad" id="numpad"></div>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="app">
  <div class="topnav">
    <div class="nav-brand">🏫 پنل مدیریت مدارس غیردولتی</div>
    <div class="nav-actions">
      <button class="nav-btn" id="exportAllBtn">📤 خروجی</button>
      <button class="nav-btn" id="backupBtn">💾 بکاپ محلی</button>
      <button class="nav-btn" onclick="restoreBackup()">📂 بازگردانی محلی</button>
      <button class="nav-btn" id="driveConnectBtn" onclick="GD.connect()">🔗 اتصال Drive</button>
      <span id="driveStatus" style="font-size:11px;color:#34d399;display:none">☁️ Drive متصل</span>
      <button class="nav-btn" onclick="logout()">خروج</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-content" id="mainContent"></div>
  </div>
  <div class="mobile-nav" id="mobileNav"></div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="restoreFile" accept=".json" style="display:none" onchange="loadBackup(this)">

<script>
const ADMIN_PIN='1234', VIEWER_PIN='5678';
const ROLES_SELECT=[
  'معاون آموزشی','معاون پرورشی','معاون اجرایی','معاون فناوری',
  'آموزگار پایه اول','آموزگار پایه دوم','آموزگار پایه سوم',
  'آموزگار پایه چهارم','آموزگار پایه پنجم','آموزگار پایه ششم',
  'دبیر ریاضی','دبیر علوم','دبیر ادبیات','دبیر عربی','دبیر دین و زندگی',
  'دبیر تاریخ','دبیر جغرافیا','دبیر زبان انگلیسی','دبیر فیزیک',
  'دبیر شیمی','دبیر زیست','دبیر هنر','دبیر تربیت بدنی','دبیر کار و فناوری',
  'موسس','مدیر','مربی بهداشت','مربی ورزش','نیروی خدماتی'
];
const ROLES_ORDER=[
  'موسس','مدیر','معاون آموزشی','معاون پرورشی','معاون اجرایی','معاون فناوری',
  'آموزگار پایه اول','آموزگار پایه دوم','آموزگار پایه سوم','آموزگار پایه چهارم','آموزگار پایه پنجم','آموزگار پایه ششم',
  'دبیر ریاضی','دبیر علوم','دبیر ادبیات','دبیر عربی','دبیر دین و زندگی','دبیر تاریخ','دبیر جغرافیا','دبیر زبان انگلیسی','دبیر فیزیک','دبیر شیمی','دبیر زیست','دبیر هنر','دبیر تربیت بدنی','دبیر کار و فناوری',
  'مربی بهداشت','مربی ورزش','نیروی خدماتی'
];
const EVAL_QS=[

// STORAGE
let _saveTimer=null;
function save(){
  try{localStorage.setItem('schooldb_v4',JSON.stringify(DB));}catch(e){}
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{ if(GD&&GD.accessToken) GD.saveBackup(); },2000);
}

function load(){
  // Simple sync load from localStorage
  try{
    const d=localStorage.getItem('schooldb_v4');
    if(d){const p=JSON.parse(d);if(p&&p.schools&&p.schools.length>0){DB=p;}}
    else{DB=JSON.parse(JSON.stringify(SEED_DATA));}
  }catch(e){DB=JSON.parse(JSON.stringify(SEED_DATA));}
  if(!DB.schools)DB.schools=[];
  if(!DB.quickContacts)DB.quickContacts=[];
}

// Called after GD is ready — tries to load from Drive and refresh UI
async function loadFromDrive(){
  const saved=localStorage.getItem('gd_token');
  if(!saved) return;
  GD.accessToken=saved;

  // Show subtle loading indicator in topnav
  const status=document.getElementById('driveStatus');
  if(status){ status.textContent='☁️ در حال sync...'; status.style.display='inline'; }

  try{
    const res=await fetch('https://www.googleapis.com/drive/v3/files/'+GD.DRIVE_FILE_ID+'?alt=media',
      {headers:{Authorization:'Bearer '+GD.accessToken}});
    if(res.ok){
      const data=await res.json();
      if(data&&data.schools&&data.schools.length>0){
        DB=data;
        localStorage.setItem('schooldb_v4',JSON.stringify(DB));
        if(!DB.quickContacts)DB.quickContacts=[];
        renderPage();
        if(status){ status.textContent='☁️ Drive متصل'; }
        toast('✅ اطلاعات از Drive به‌روز شد');
      }
    } else if(res.status===401){
      GD.accessToken=null;
      localStorage.removeItem('gd_token');
      if(status){ status.style.display='none'; }
    }
  }catch(e){
    if(status){ status.textContent='☁️ Drive'; }
  }
}

// LOGIN
function buildLogin(){
  const pd=document.getElementById('pinDisplay');
  const np=document.getElementById('numpad');
  pd.innerHTML=Array(4).fill(0).map((_,i)=>`<div class="pin-dot" id="pd${i}"></div>`).join('');
  const nums=['۱','۲','۳','۴','۵','۶','۷','۸','۹','','۰','⌫'];
  const vals=['1','2','3','4','5','6','7','8','9','','0','del'];
  np.innerHTML=nums.map((n,i)=>n===''?'<div></div>':`<button class="num-btn${n==='⌫'?' del':''}" onclick="pinPress('${vals[i]}')">${n}</button>`).join('');
}
function pinPress(v){
  const err=document.getElementById('loginErr');
  if(v==='del')pinInput=pinInput.slice(0,-1);
  else if(pinInput.length<4)pinInput+=v;
  for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.className='pin-dot'+(i<pinInput.length?' filled':'');}
  err.textContent='';
  if(pinInput.length===4){
    if(pinInput===ADMIN_PIN)loginOk('admin');
    else if(pinInput===VIEWER_PIN)loginOk('viewer');
    else{err.textContent='کد اشتباه است';setTimeout(()=>{pinInput='';for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.className='pin-dot';}},600);}
  }
}
function loginOk(role){
  currentUser=role;
  document.getElementById('login-screen').style.display='none';
  const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';
  buildApp();
}
function logout(){
  currentUser=null;pinInput='';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.className='pin-dot';}
}

const PAGES_ADMIN=[
  {id:'schools',icon:'🏫',label:'مدارس'},
  {id:'tuition',icon:'💰',label:'شهریه'},
  {id:'haghsahm',icon:'🧾',label:'حق‌السهم'},

];
const PAGES_VIEWER=[{id:'schools',icon:'🏫',label:'مدارس'}];
function buildApp(){
  const pages=currentUser==='admin'?PAGES_ADMIN:PAGES_VIEWER;
  document.getElementById('sidebar').innerHTML=pages.map(p=>`<div class="sidebar-item${p.id===activePage?' active':''}" onclick="goPage('${p.id}')"><span>${p.icon}</span>${p.label}</div>`).join('');
  document.getElementById('mobileNav').innerHTML=pages.map(p=>`<div class="mobile-nav-item${p.id===activePage?' active':''}" onclick="goPage('${p.id}')"><span>${p.icon}</span><span>${p.label}</span></div>`).join('');
  document.getElementById('exportAllBtn').style.display=currentUser==='admin'?'':'none';
  document.getElementById('backupBtn').style.display=currentUser==='admin'?'':'none';
  renderPage();
}
function goPage(id){activePage=id;activeFilter=null;sortMode='default';buildApp();}

function renderPage(){

  else if(activePage==='haghsahm')mc.innerHTML=renderHaghSahmPage();

// ── STATS CHIPS ──
function calcStats(){
  const s=DB.schools;
  const dkh=s.filter(x=>x.gender==='دخترانه');
  const psr=s.filter(x=>x.gender==='پسرانه');
  const ebt=s.filter(x=>x.level==='ابتدایی');
  const mt1=s.filter(x=>x.level==='متوسطه اول');
  const mt2=s.filter(x=>x.level==='متوسطه دوم');
  const totalSt=s.reduce((a,x)=>a+(parseInt(x.students)||0),0);
  const stD=dkh.reduce((a,x)=>a+(parseInt(x.students)||0),0);
  const stP=psr.reduce((a,x)=>a+(parseInt(x.students)||0),0);
  // staff counts
  let teachers=0, debirs=0;
  s.forEach(sc=>(sc.staff||[]).forEach(st=>{
    if(st.role&&st.role.startsWith('آموزگار'))teachers++;
    if(st.role&&st.role.startsWith('دبیر'))debirs++;
  }));
  const withWarn=s.filter(x=>(x.warnings||[]).some(w=>w.status==='باز')).length;
  return {total:s.length,dkh:dkh.length,psr:psr.length,ebt:ebt.length,mt1:mt1.length,mt2:mt2.length,
    totalSt,stD,stP,teachers,debirs,withWarn,active:s.filter(x=>!x.status||x.status==='فعال').length};
}
function renderStatsBar(){
  const st=calcStats();
  const chips=[
    {dot:'white',val:st.total,lbl:'کل مدارس',filter:null},
    {dot:'purple',val:st.dkh,lbl:'دخترانه',filter:{t:'gender',v:'دخترانه'}},
    {dot:'orange',val:st.psr,lbl:'پسرانه',filter:{t:'gender',v:'پسرانه'}},
    {dot:'green',val:st.ebt,lbl:'ابتدایی',filter:{t:'level',v:'ابتدایی'}},
    {dot:'yellow',val:st.mt1,lbl:'متوسطه اول',filter:{t:'level',v:'متوسطه اول'}},
    {dot:'red',val:st.mt2,lbl:'متوسطه دوم',filter:{t:'level',v:'متوسطه دوم'}},
    {dot:'white',val:st.totalSt,lbl:'دانش‌آموزان',filter:null},
    {dot:'purple',val:st.stD,lbl:'دانش‌آموز دختر',filter:{t:'gender',v:'دخترانه'}},
    {dot:'orange',val:st.stP,lbl:'دانش‌آموز پسر',filter:{t:'gender',v:'پسرانه'}},
    {dot:'green',val:st.teachers,lbl:'آموزگار',filter:{t:'has_teacher',v:true}},
    {dot:'yellow',val:st.debirs,lbl:'دبیر',filter:{t:'has_debir',v:true}},
    {dot:'red',val:st.withWarn,lbl:'دارای اخطار',filter:{t:'has_warn',v:true}},
  ];
  return `<div class="stats-bar">${chips.map(c=>{
    const af=activeFilter&&JSON.stringify(activeFilter)===JSON.stringify(c.filter);
    const clickable=c.filter?`onclick="setFilter(${JSON.stringify(c.filter)})"`:'' ;
    return `<div class="stat-chip${af?' active-filter':''}" ${clickable}>
      <div class="chip-dot ${c.dot}"></div>
      <span class="chip-val">${c.val.toLocaleString('fa-IR')}</span>
      <span class="chip-lbl">${c.lbl}</span>
    </div>`;
  }).join('')}</div>`;
}
function setFilter(f){
  activeFilter=(activeFilter&&JSON.stringify(activeFilter)===JSON.stringify(f))?null:f;
  renderPage();
}

        <option value="no_warn">بدون اخطار</option>

      </select>

function getFilteredSorted(){
  let list=[...DB.schools];
  if(activeFilter){
    const f=activeFilter;
    if(f.t==='gender')list=list.filter(s=>s.gender===f.v);
    else if(f.t==='level')list=list.filter(s=>s.level===f.v);
    else if(f.t==='has_warn')list=list.filter(s=>(s.warnings||[]).some(w=>w.status==='باز'));
    else if(f.t==='has_teacher')list=list.filter(s=>(s.staff||[]).some(st=>st.role&&st.role.startsWith('آموزگار')));
    else if(f.t==='has_debir')list=list.filter(s=>(s.staff||[]).some(st=>st.role&&st.role.startsWith('دبیر')));
  }
  return applySortFilter(list);
}
function applySortFilter(list){
  const mode=sortMode||'default';
  if(mode==='rank')return [...list].sort((a,b)=>calcEvalScore(b)-calcEvalScore(a));
  if(mode==='students_desc')return [...list].sort((a,b)=>(parseInt(b.students)||0)-(parseInt(a.students)||0));
  if(mode==='name')return [...list].sort((a,b)=>a.name.localeCompare(b.name,'fa'));
  return list;
}
function filterSchools(){
  const q=(document.getElementById('schoolSearch')||{}).value||'';
  const gender=(document.getElementById('filterGender')||{}).value||'';
  const level=(document.getElementById('filterLevel')||{}).value||'';
  const warn=(document.getElementById('filterWarn')||{}).value||'';
  const sm=(document.getElementById('sortSel')||{}).value||'default';
  sortMode=sm;
  let list=getFilteredSorted().filter(s=>{
    if(q&&!JSON.stringify(s).toLowerCase().includes(q.toLowerCase()))return false;
    if(gender&&s.gender!==gender)return false;
    if(level&&s.level!==level)return false;
    if(warn==='has_warn'&&!(s.warnings||[]).some(w=>w.status==='باز'))return false;
    if(warn==='no_warn'&&(s.warnings||[]).some(w=>w.status==='باز'))return false;
    if(warn==='inactive'&&s.status!=='غیرفعال')return false;
    if(warn==='review'&&s.status!=='نیاز به بررسی')return false;
    return true;
  });
  const c=document.getElementById('schoolCards');
  if(c)c.innerHTML=renderSchoolCards(list);
}
function renderSchoolCards(list){
  if(!list.length)return`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🏫</div><div>هیچ مدرسه‌ای یافت نشد</div></div>`;
  return list.map(s=>{
    const warns=(s.warnings||[]).filter(w=>w.status==='باز').length;
    const stCls=s.status==='غیرفعال'?'s-inactive':s.status==='نیاز به بررسی'?'s-review':'s-active';
    const evalScore=calcEvalScore(s);
    const founder=(s.staff||[]).find(x=>x.role==='موسس');
    const manager=(s.staff||[]).find(x=>x.role==='مدیر');
    return `<div class="school-card${s.status==='غیرفعال'?' inactive':''}" onclick="openSchool('${s.id}')">
      <div class="sc-top">
        <div><div class="sc-name">${s.name}</div><div class="sc-code">کد: ${s.code||'—'}</div></div>
        <span class="status-badge ${stCls}">${s.status||'فعال'}</span>
      </div>
      <div class="sc-tags">
        ${s.level?`<span class="tag">${s.level}</span>`:''}
        ${s.gender?`<span class="tag">${s.gender}</span>`:''}
        ${s.students?`<span class="tag">👤 ${s.students}</span>`:''}
      </div>
      ${(founder||manager)?`<div class="sc-people">
        ${founder?`<div class="sc-person">
          <span class="sc-person-role">موسس</span>
          <span class="sc-person-name">${founder.name}</span>
          ${founder.phone?`<a href="tel:${founder.phone}" class="sc-person-phone" onclick="event.stopPropagation()">📞</a>`:''}
        </div>`:''}
        ${manager?`<div class="sc-person">
          <span class="sc-person-role">مدیر</span>
          <span class="sc-person-name">${manager.name}</span>
          ${manager.phone?`<a href="tel:${manager.phone}" class="sc-person-phone" onclick="event.stopPropagation()">📞</a>`:''}
        </div>`:''}
      </div>`:''}
      <div class="sc-footer">
        <span class="sc-score">📊 ${evalScore>0?evalScore.toFixed(1)+'/5':'—'}</span>
        ${warns?`<span class="sc-warns">⚠️ ${warns} اخطار</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── SCHOOL MODAL ──
function openSchool(id){openSchoolId=id;activeTab='info';showSchoolModal();}
function showSchoolModal(){
  const s=DB.schools.find(x=>x.id===openSchoolId);if(!s)return;
  const isAdmin=currentUser==='admin';
  const tabs=isAdmin
    ?[{id:'info',l:'اطلاعات'},{id:'staff',l:'نیروها'},{id:'visits',l:'بازدیدها'},{id:'warnings',l:'اخطارها'},{id:'eval',l:'ارزشیابی'},{id:'notes',l:'یادداشت'}]
    :[{id:'info',l:'اطلاعات'},{id:'staff',l:'نیروها'}];
  removeModal('schoolModal');
  document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="schoolModal" onclick="closeModalOvl(event,'schoolModal')">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-top">
        <div><div class="modal-title">${s.name}</div><div style="font-size:10px;color:var(--text3)">کد: ${s.code||'—'} | ${s.district||''}</div></div>
        <div style="display:flex;gap:5px;align-items:center">
          ${isAdmin?`<button class="btn btn-ghost btn-sm" onclick="openEditSchool('${s.id}')">✏️ ویرایش</button>
          <button class="btn btn-danger btn-sm" onclick="deleteSchool('${s.id}')">🗑 حذف</button>`:''}
          <div class="modal-close" onclick="removeModal('schoolModal')">×</div>
        </div>
      </div>
      <div class="modal-body">
        <div class="tabs" id="schTabs">${tabs.map(t=>`<button class="tab${t.id===activeTab?' active':''}" onclick="switchTab('${t.id}')">${t.l}</button>`).join('')}</div>
        <div id="tabContent">${renderTab(s,activeTab)}</div>
      </div>
    </div>
  </div>`);
}
function switchTab(t){
  activeTab=t;
  const s=DB.schools.find(x=>x.id===openSchoolId);if(!s)return;
  document.querySelectorAll('#schTabs .tab').forEach(el=>{
    el.className='tab'+(el.getAttribute('onclick')===`switchTab('${t}')`?' active':'');
  });
  const tc=document.getElementById('tabContent');if(tc)tc.innerHTML=renderTab(s,t);
}
function renderTab(s,t){
  if(t==='info')return renderInfoTab(s);
  if(t==='staff')return renderStaffTab(s);
  if(t==='visits')return renderVisitsTab(s);
  if(t==='warnings')return renderWarningsTab(s);
  if(t==='eval')return renderEvalTab(s);
  if(t==='notes')return renderNotesTab(s);
  return '';
}

  if(note)s.tuitionNote=note.value;
  save();toast('شهریه ذخیره شد');
}

// ── STAFF TAB ──
function renderStaffTab(s){
  const isAdmin=currentUser==='admin';
  const isViewer=currentUser==='viewer';
  let staff=s.staff||[];
  // exclude founder & manager (they're in info tab)
  let display=isViewer
    ?staff.filter(x=>x.role!=='موسس'&&x.role!=='مدیر').slice(0,0) // viewer sees nothing extra
    :orderStaff(staff.filter(x=>x.role!=='موسس'&&x.role!=='مدیر'));
  if(isViewer)return`<div class="empty"><div class="empty-icon">🔒</div><div>نیروها فقط برای مدیر قابل مشاهده است</div></div>`;
  return `<div style="margin-bottom:10px"><button class="btn btn-primary btn-sm" onclick="openAddStaff('${s.id}')">➕ افزودن نیرو</button></div>
  <div class="staff-list">${display.length
    ?display.map(st=>renderStaffItem(s.id,st)).join('')
    :'<div class="empty"><div class="empty-icon">👤</div><div>نیروی دیگری ثبت نشده</div></div>'
  }</div>`;
}
function orderStaff(staff){
  const ordered=[];
  ROLES_ORDER.forEach(r=>staff.filter(x=>x.role===r).forEach(x=>ordered.push(x)));
  staff.filter(x=>!ROLES_ORDER.includes(x.role)).forEach(x=>ordered.push(x));
  return ordered;
}
function renderStaffItem(sid,st){
  return `<div class="staff-item">
    <div class="staff-fields">
      <div class="sf-role">${st.role}</div>
      <div class="sf-name">${st.name}</div>
      ${st.phone?`<a href="tel:${st.phone}" class="sf-phone phone-link" onclick="event.stopPropagation()">${st.phone}</a>`:'<span class="sf-phone" style="color:var(--text3)">—</span>'}
      ${st.nationalId?`<div class="sf-nid">ک.م: ${st.nationalId}</div>`:'<span></span>'}
    </div>
    <div class="staff-actions">
      <button class="icon-btn" onclick="openEditStaff('${sid}','${st.id}')" title="ویرایش">✏️</button>
      <button class="icon-btn del" onclick="deleteStaff('${sid}','${st.id}')" title="حذف">🗑</button>
    </div>
  </div>`;
}

// ── EVAL TAB ──
function calcEvalScore(s){
  const ev=s.eval||{};const keys=Object.keys(ev);if(!keys.length)return 0;
  let sum=0,cnt=0;keys.forEach(k=>{const v=SCORE_MAP[ev[k]];if(v){sum+=v;cnt++;}});
  return cnt?sum/cnt:0;
}
function renderEvalTab(s){
  const ev=s.eval||{};
  const score=calcEvalScore(s);
  // Group by category
  const cats={};
  EVAL_QS.forEach((q,qi)=>{
    if(!cats[q.cat])cats[q.cat]=[];
    cats[q.cat].push({q,qi});
  });
  // Per-category scores
  const catScores={};
  Object.entries(cats).forEach(([cat,items])=>{
    let sum=0,cnt=0;
    items.forEach(({qi})=>{const v=SCORE_MAP[ev[qi]];if(v){sum+=v;cnt++;}});
    catScores[cat]=cnt?sum/cnt:0;
  });
  return `<div style="margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div><span style="font-size:12px;color:var(--text2)">میانگین کل: </span><span style="font-size:22px;font-weight:800;color:var(--yellow)">${score>0?score.toFixed(2)+' / 5':'—'}</span></div>
    <div style="font-size:11px;color:var(--text3)">${Object.keys(ev).length} / ${EVAL_QS.length} شاخص تکمیل شده</div>
  </div>
  <div class="eval-list">${Object.entries(cats).map(([cat,items])=>{
    const cs=catScores[cat];
    const filled=items.filter(({qi})=>ev[qi]).length;
    return `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px">
      <div style="padding:9px 13px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px">
        <span style="font-size:12px;font-weight:700;color:var(--accent3)">${cat}</span>
        <span style="font-size:11px;color:var(--text3)">${filled}/${items.length} | ${cs>0?'⭐ '+cs.toFixed(1):'—'}</span>
      </div>
      <div style="padding:8px">
      ${items.map(({q,qi})=>`<div class="eval-item" style="margin-bottom:5px;background:var(--card)">
        <div class="eval-q">${q.q}</div>
        <div class="eval-opts">${EVAL_OPTS.map((o,oi)=>`<button class="eval-opt${ev[qi]===o?` sel-${oi+1}`:''}" onclick="setEval('${s.id}',${qi},'${o}')">${o}</button>`).join('')}</div>
      </div>`).join('')}
      </div>
    </div>`;
  }).join('')}</div>`;
}
function setEval(sid,qi,val){
  const s=DB.schools.find(x=>x.id===sid);if(!s)return;
  if(!s.eval)s.eval={};s.eval[qi]=val;save();switchTab('eval');toast('ذخیره شد');
}

function exportHaghSahm(){
  const rows=[['ردیف','نام مدرسه','کد','مقطع','جنسیت','تعداد دانش‌آموز','نرخ (تومان)','حق‌السهم (تومان)']];

        <div class="rank-score-bar" style="margin-top:4px"><div class="rank-score-fill" style="width:${(s._sc/5*100).toFixed(0)}%"></div></div>
      </div>
      <div class="rank-score-txt">${s._sc>0?s._sc.toFixed(2):'—'}</div>

    :'<div class="empty"><div class="empty-icon">🏆</div><div>ابتدا مدارس را ارزشیابی کنید</div></div>'}

}

function openAddContact(){
  showFormModal('افزودن شماره سریع',`<div class="form-grid">
  <div class="form-group"><label class="form-label">نام</label><input class="form-input" id="cf_name"></div>
  <div class="form-group"><label class="form-label">شماره</label><input class="form-input" id="cf_phone"></div>
  <div class="form-group full"><label class="form-label">توضیح</label><input class="form-input" id="cf_desc"></div>
  </div>`,()=>{
    const c={id:genId(),name:v('cf_name'),phone:v('cf_phone'),desc:v('cf_desc')};
    if(!c.name){toast('نام اجباری است','err');return;}
    if(!DB.quickContacts)DB.quickContacts=[];DB.quickContacts.push(c);save();
    removeModal('formModal');renderPage();toast('اضافه شد');
  });
}
function deleteContact(cid){DB.quickContacts=(DB.quickContacts||[]).filter(x=>x.id!==cid);save();renderPage();toast('حذف شد');}

// ── TUITION HELPERS ──
function exportTuition(){
  const rows=[['نام مدرسه','کد','مقطع','جنسیت','شهریه مصوب (ریال)','جمع واریزی','مانده']];
  DB.schools.forEach(s=>{
    const app=parseFloat(s.tuitionAmount)||0;
    const paid=(s.payments||[]).reduce((a,p)=>a+(parseFloat(p.amount)||0),0);
    rows.push([s.name,s.code,s.level,s.gender,app,paid,paid-app]);
  });
  downloadCSV(rows,'شهریه.csv');toast('خروجی دریافت شد');
}

// ── EXPORT ALL ──
document.getElementById('exportAllBtn').addEventListener('click',()=>{
  const rows=[['ردیف','نام','کد','اداره','مقطع','نوع','جنسیت','تلفن','دانش‌آموز','وضعیت','آدرس','موسس','ک.م موسس','موبایل موسس','مدیر','ک.م مدیر','موبایل مدیر','امتیاز','شهریه مصوب','حق‌السهم']];
  DB.schools.forEach((s,i)=>{
    const f=(s.staff||[]).find(x=>x.role==='موسس')||{};
    const m=(s.staff||[]).find(x=>x.role==='مدیر')||{};
    const rate=HAGH_RATES[s.level]||50000;
    const hs=(parseInt(s.students)||0)*rate;
    rows.push([i+1,s.name,s.code,s.district,s.level,s.type,s.gender,s.phone,s.students,s.status||'فعال',s.address,
      f.name||'',f.nationalId||'',f.phone||'',m.name||'',m.nationalId||'',m.phone||'',
      calcEvalScore(s)>0?calcEvalScore(s).toFixed(2):'',s.tuitionAmount||'',hs]);
  });
  downloadCSV(rows,'مدارس_'+todayJalali().replace(/\//g,'-')+'.csv');
  toast('خروجی دریافت شد');
});
function downloadCSV(rows,name){
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=name;a.click();
}

// ── GOOGLE DRIVE INTEGRATION ──
const GD = {
  CLIENT_ID: '638415075823-97m10gv13pemer622ngbla2hbs85se1j.apps.googleusercontent.com',
  SCOPES: 'https://www.googleapis.com/auth/drive.file',
  DRIVE_FILE_ID: '1GSarhub7H-sHNYtKekteSfPW4ho-gETC',
  tokenClient: null,
  accessToken: null,

  init() {
    this.tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: this.CLIENT_ID,
      scope: this.SCOPES,
      callback: (resp) => {
        if (resp.error) { toast('خطا در ورود به Google', 'err'); return; }
        this.accessToken = resp.access_token;
        localStorage.setItem('gd_token', resp.access_token);
        if (this._pendingAction) { this._pendingAction(); this._pendingAction = null; }
      }
    });
    const saved = localStorage.getItem('gd_token');
    if (saved) this.accessToken = saved;
  },

  ensureAuth(action) {
    if (this.accessToken) { action(); return; }
    this._pendingAction = action;
    this.tokenClient.requestAccessToken({ prompt: 'consent' });
  },

  async saveBackup() {
    toast('در حال آپلود...');
    const content = JSON.stringify(DB, null, 2);
    const blob = new Blob([content], { type: 'application/json' });

    const res = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${this.DRIVE_FILE_ID}?uploadType=media`,
      {
        method: 'PATCH',
        headers: {
          Authorization: 'Bearer ' + this.accessToken,
          'Content-Type': 'application/json'
        },
        body: blob
      }
    );

    if (res.ok) {
      const now = new Date().toLocaleString('fa-IR');
      toast('✅ بکاپ در Google Drive ذخیره شد — ' + now);
    } else if (res.status === 401) {
      this.accessToken = null;
      localStorage.removeItem('gd_token');
      toast('نشست منقضی شد — دوباره تلاش کنید', 'err');
    } else {
      toast('خطا در آپلود: ' + res.status, 'err');
    }
  },

  async listBackups() {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name contains 'backup_madares_' and mimeType='application/json'&orderBy=createdTime desc&fields=files(id,name,createdTime,size)`,
      { headers: { Authorization: 'Bearer ' + this.accessToken } }
    );
    const data = await res.json();
    return data.files || [];
  },

  async restoreFromDrive() {
    toast('در حال دریافت...');
    await this.loadFile(this.DRIVE_FILE_ID);
  },

  async loadFile(fileId) {
    document.getElementById('gdModal')?.remove();
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: 'Bearer ' + this.accessToken }
    });
    const data = await res.json();
    if (!data.schools) { toast('فایل نامعتبر', 'err'); return; }
    DB = data; save(); renderPage();
    toast('✅ بازگردانی از Drive انجام شد');
  }
};

// GD connect method (manual login)
GD.connect = function(){
  this._pendingAction = async () => {
    await this.saveBackup();
    document.getElementById('driveConnectBtn').style.display='none';
    document.getElementById('driveStatus').style.display='inline';
  };
  this.tokenClient.requestAccessToken({prompt:'consent'});
};

// Update Drive status on load
function updateDriveStatus(){
  if(GD.accessToken){
    const btn=document.getElementById('driveConnectBtn');
    const st=document.getElementById('driveStatus');
    if(btn) btn.style.display='none';
    if(st) st.style.display='inline';
  }
}
function restoreBackup(){document.getElementById('restoreFile').click();}
function loadBackup(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{const d=JSON.parse(e.target.result);if(!d.schools){toast('فایل نامعتبر','err');return;}DB=d;save();renderPage();toast('بازگردانی انجام شد');}
    catch(er){toast('خطا در فایل','err');}
  };
  reader.readAsText(file);input.value='';
}

// ── TOAST ──
function toast(msg,type){
  const el=document.getElementById('toast');el.textContent=msg;
  el.className='toast show '+(type==='err'?'err':'ok');
  setTimeout(()=>{el.className='toast';},2400);
}

load();
buildLogin();

window.addEventListener('load', ()=>{
  const tryGD = () => {
    if(typeof google !== 'undefined' && google.accounts){
      GD.init();
      updateDriveStatus();
      loadFromDrive(); // refresh data from Drive silently
    } else {
      setTimeout(tryGD, 150);
    }
  };
  tryGD();
});
